<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java-to-Agent · Supervisor</title>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --blue:      #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --purple:    #bc8cff;
      --pink:      #f778ba;
      --red:       #f85149;
      --orange:    #ffa657;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶部导航栏 ──────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .app-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }
    .app-tag {
      font-size: 0.72rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .session-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .session-id {
      color: var(--blue);
      font-family: "SF Mono", Consolas, monospace;
      font-size: 0.75rem;
    }
    .turn-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
    }
    .btn-new {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-new:hover { border-color: var(--blue); color: var(--blue); }

    /* ── 主内容区 ────────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 左侧面板 ──────────────────────────────────── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 1.25rem;
    }
    .sidebar-section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    /* 节点状态指示器 */
    .node-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .node-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      transition: all 0.2s;
    }
    .node-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .node-item.supervisor .node-dot { background: var(--yellow); }
    .node-item.parser    .node-dot { background: var(--green); }
    .node-item.analyzer  .node-dot { background: var(--purple); }
    .node-item.reporter  .node-dot { background: var(--pink); }
    .node-item.db        .node-dot { background: var(--orange); }

    /* 预设问题 */
    .preset-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .preset-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-size: 0.78rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .preset-btn:hover {
      background: var(--surface2);
      border-color: var(--blue);
      color: var(--text);
    }
    .sidebar-footer {
      margin-top: auto;
    }
    .btn-clear {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    /* ── 右侧事件流区域 ──────────────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #events {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    #events::-webkit-scrollbar { width: 6px; }
    #events::-webkit-scrollbar-track { background: transparent; }
    #events::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* 事件卡片 */
    .evt {
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      border-left: 3px solid var(--border);
      background: var(--surface);
      font-size: 0.84rem;
      line-height: 1.5;
      animation: slideIn 0.15s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .evt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.1rem;
    }
    .evt .label {
      font-weight: 600;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .evt .ts {
      color: var(--muted);
      font-size: 0.72rem;
      font-family: "SF Mono", Consolas, monospace;
    }
    .evt pre {
      margin-top: 0.4rem;
      font-size: 0.79rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "SF Mono", Consolas, monospace;
      line-height: 1.6;
    }

    /* 节点颜色 */
    .evt.info      { border-left-color: var(--border); background: var(--surface); }
    .evt.supervisor{ border-left-color: var(--yellow);  background: rgba(210,153,34,0.06); }
    .evt.parser    { border-left-color: var(--green);   background: rgba(63,185,80,0.06); }
    .evt.analyzer  { border-left-color: var(--purple);  background: rgba(188,140,255,0.06); }
    .evt.reporter  { border-left-color: var(--pink);    background: rgba(247,120,186,0.06); }
    .evt.db        { border-left-color: var(--orange);  background: rgba(255,166,87,0.06); }
    .evt.done      { border-left-color: var(--green);   background: rgba(63,185,80,0.08); }
    .evt.error     { border-left-color: var(--red);     background: rgba(248,81,73,0.08); color: #fca5a5; }
    .evt.cancelled { border-left-color: var(--yellow);  background: rgba(210,153,34,0.08); color: #fcd34d; }

    /* token 流式气泡 */
    .evt.streaming {
      border-left-color: var(--blue);
      background: rgba(88,166,255,0.04);
    }
    .evt.streaming pre::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      color: var(--blue);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── HITL 卡片 ──────────────────────────────────── */
    .hitl-card {
      border: 1px solid var(--yellow);
      border-left: 4px solid var(--yellow);
      background: rgba(210,153,34,0.08);
      border-radius: 8px;
      padding: 1rem 1.1rem;
      animation: slideIn 0.15s ease-out;
    }
    .hitl-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--yellow);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .hitl-card p { font-size: 0.83rem; color: var(--muted); margin-bottom: 0.3rem; }
    .hitl-card p strong { color: var(--text); }
    .hitl-card .hitl-preview {
      margin: 0.6rem 0;
      padding: 0.5rem 0.7rem;
      background: var(--surface2);
      border-radius: 6px;
      font-size: 0.78rem;
      font-family: "SF Mono", Consolas, monospace;
      color: var(--muted);
      max-height: 80px;
      overflow-y: auto;
    }
    .hitl-btns { display: flex; gap: 0.6rem; margin-top: 0.8rem; }
    .btn-approve {
      background: rgba(63,185,80,0.15);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-approve:hover { background: rgba(63,185,80,0.25); }
    .btn-reject {
      background: rgba(248,81,73,0.08);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-reject:hover { background: rgba(248,81,73,0.18); }

    /* ── 底部输入区 ──────────────────────────────────── */
    .input-area {
      padding: 0.9rem 1.5rem 1rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 0.9rem;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--blue); }
    #query {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.65rem 0;
      font-family: inherit;
    }
    #query::placeholder { color: var(--muted); }
    .btn-send {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.3rem;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-send:hover:not(:disabled) { background: #4493f8; }
    .btn-send:disabled {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }
    .btn-send-inner { display: flex; align-items: center; gap: 0.4rem; }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-send.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🎯</div>
    <span class="app-name">Java-to-Agent</span>
    <span class="app-tag">LangGraph Supervisor</span>
  </div>
  <div class="session-info">
    <span>Session <span class="session-id" id="sidLabel">——</span></span>
    <span class="turn-badge"><span id="turnLabel">0</span> 轮</span>
    <button class="btn-new" onclick="newConversation()">↺ 新对话</button>
  </div>
</div>

<!-- 主内容 -->
<div class="main">

  <!-- 左侧面板 -->
  <div class="sidebar">
    <div>
      <div class="sidebar-section-title">Agent 节点</div>
      <div class="node-list">
        <div class="node-item supervisor">
          <div class="node-dot"></div>
          <span>Supervisor</span>
        </div>
        <div class="node-item parser">
          <div class="node-dot"></div>
          <span>Parser</span>
        </div>
        <div class="node-item analyzer">
          <div class="node-dot"></div>
          <span>Analyzer</span>
        </div>
        <div class="node-item reporter">
          <div class="node-dot"></div>
          <span>Reporter</span>
        </div>
        <div class="node-item db">
          <div class="node-dot"></div>
          <span>DB Agent</span>
        </div>
      </div>
    </div>

    <div>
      <div class="sidebar-section-title">快速提问</div>
      <div class="preset-list">
        <button class="preset-btn" onclick="fill('今天有多少 ERROR？')">📊 统计 ERROR 数</button>
        <button class="preset-btn" onclick="fill('DBPool 为什么失败？')">🔍 DBPool 根因</button>
        <button class="preset-btn" onclick="fill('报错最多的 3 个服务？')">🏆 Top 3 服务</button>
        <button class="preset-btn" onclick="fill('那 Payment 呢？')">💬 追问 Payment</button>
        <button class="preset-btn" onclick="fill('生成今天的结构化日志报告')">📋 生成报告</button>
        <button class="preset-btn" onclick="fill('查询订单金额最高的用户是谁')">🗄 DB 查询</button>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-clear" onclick="clearEvents()">清空事件流</button>
    </div>
  </div>

  <!-- 右侧事件流 + 输入 -->
  <div class="chat-area">
    <div id="events"></div>

    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="query"
          placeholder="输入你的问题，支持日志分析 / 根因分析 / 数据库查询..."
          value="DBPool 为什么失败？" />
      </div>
      <button class="btn-send" id="sendBtn" onclick="send()">
        <div class="btn-send-inner">
          <div class="spinner"></div>
          <span id="sendLabel">发送</span>
        </div>
      </button>
    </div>
  </div>

</div>

<script>
// ── session 管理 ─────────────────────────────────────────────
const SESSION_KEY = 'lg_session_id';

function getSessionId() { return localStorage.getItem(SESSION_KEY); }
function setSessionId(id) {
  localStorage.setItem(SESSION_KEY, id);
  updateSessionLabel(id, null);
}
function clearSessionId() {
  localStorage.removeItem(SESSION_KEY);
  updateSessionLabel(null, 0);
}
function updateSessionLabel(id, turn) {
  const sidEl = document.getElementById('sidLabel');
  const turnEl = document.getElementById('turnLabel');
  if (id) sidEl.textContent = id.slice(0, 8) + '…';
  else    sidEl.textContent = '——';
  if (turn !== null && turn !== undefined) turnEl.textContent = turn;
}
async function newConversation() {
  const oldId = getSessionId();
  if (oldId) fetch(`/session/${oldId}`, { method: 'DELETE' }).catch(() => {});
  clearSessionId();
  clearEvents();
  addEvent('info', '🆕 已开始新对话');
}

let pendingThreadId = null;
updateSessionLabel(getSessionId(), null);

// ── 发送 ─────────────────────────────────────────────────────
async function send() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;
  addEvent('info', `🚀 ${query}`);
  const body = { query };
  const sid = getSessionId();
  if (sid) body.session_id = sid;
  await callAndReadSSE('/chat/stream', body);
}

async function callAndReadSSE(url, body) {
  const btn = document.getElementById('sendBtn');
  const label = document.getElementById('sendLabel');
  btn.disabled = true;
  btn.classList.add('loading');
  label.textContent = '运行中';
  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    await readSSEStream(resp);
  } catch (e) {
    addEvent('error', `❌ ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    label.textContent = '发送';
  }
}

async function readSSEStream(resp) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const chunks = buffer.split(/\r?\n\r?\n/);
    buffer = chunks.pop() || '';
    for (const chunk of chunks) {
      if (!chunk.trim()) continue;
      let eventType = 'message', dataStr = '';
      for (const line of chunk.split(/\r?\n/)) {
        if (line.startsWith('event:')) eventType = line.slice(6).trim();
        else if (line.startsWith('data:')) dataStr += line.slice(5).trim();
      }
      if (!dataStr) continue;
      try { renderEvent(eventType, JSON.parse(dataStr)); }
      catch (e) { console.warn('parse err', e); }
    }
  }
}

async function approveOrReject(approved) {
  if (!pendingThreadId) return;
  const body = { thread_id: pendingThreadId, approved, session_id: getSessionId() };
  pendingThreadId = null;
  addEvent('info', approved ? '✅ 已确认继续' : '🛑 已取消');
  await callAndReadSSE('/chat/resume', body);
}

// ── 事件渲染 ─────────────────────────────────────────────────
const NODE_ICONS = {
  supervisor: '🧭', parser: '📂', analyzer: '🔬', reporter: '📋', db: '🗄'
};

function renderEvent(eventType, payload) {
  if (eventType === 'session') {
    if (payload.session_id) setSessionId(payload.session_id);
    updateSessionLabel(payload.session_id, payload.prev_turns ?? 0);
    addEvent('info', `🔗 session ${payload.session_id.slice(0, 8)}… · 历史 ${payload.prev_turns} 轮`);
  } else if (eventType === 'token') {
    appendToken(payload.node || 'agent', payload.delta || '');
  } else if (eventType === 'node') {
    const { node, step, update = {} } = payload;
    const cls = ['supervisor','parser','analyzer','reporter','db'].includes(node) ? node : 'node';
    let summary = '';
    if (node === 'supervisor') {
      summary = `路由 → ${update.next_agent || '?'}（loop ${update.loop_count || '?'}）`;
    } else if (update.agent_outputs?.length) {
      summary = update.agent_outputs[update.agent_outputs.length - 1];
    } else if (update.final_report) {
      summary = `生成结构化报告：${update.final_report.summary || 'OK'}`;
    } else {
      summary = `节点 ${node} 执行完成`;
    }
    finalizeToken(node);
    const icon = NODE_ICONS[node] || '⚙';
    addEvent(cls, `${icon} ${node}`, summary, step);
  } else if (eventType === 'interrupt') {
    pendingThreadId = payload.thread_id;
    renderHitlCard(payload);
  } else if (eventType === 'cancelled') {
    addEvent('cancelled', `🛑 已取消 ${payload.pending_node || ''}`);
  } else if (eventType === 'done') {
    const fs = payload.final_state || {};
    if (payload.session_id) setSessionId(payload.session_id);
    updateSessionLabel(payload.session_id, payload.turn);
    let text = `✓ ${fs.loop_count || '?'} 次调度 · 第 ${payload.turn} 轮`;
    if (fs.final_report) {
      text += `\n\n${JSON.stringify(fs.final_report, null, 2)}`;
    }
    addEvent('done', '✅ 完成', text);
  } else if (eventType === 'error') {
    addEvent('error', '❌ 错误', payload.message || '未知错误');
  }
}

function renderHitlCard(payload) {
  const events = document.getElementById('events');
  const card = document.createElement('div');
  card.className = 'hitl-card';
  const preview = (payload.state_preview?.agent_outputs || [])
    .map(s => escapeHtml(s.slice(0, 200))).join('\n');
  card.innerHTML = `
    <div class="hitl-title">⏸ 等待确认</div>
    <p><strong>即将执行：</strong>${escapeHtml(payload.pending_node)}</p>
    <p>${escapeHtml(payload.reason)}</p>
    ${preview ? `<div class="hitl-preview">${preview}</div>` : ''}
    <div class="hitl-btns">
      <button class="btn-approve" onclick="approveOrReject(true); this.closest('.hitl-card').remove()">✅ 继续执行</button>
      <button class="btn-reject"  onclick="approveOrReject(false); this.closest('.hitl-card').remove()">🛑 取消</button>
    </div>`;
  events.appendChild(card);
  events.scrollTop = events.scrollHeight;
}

function addEvent(cls, label, body = '', step = null) {
  const div = document.createElement('div');
  div.className = `evt ${cls}`;
  const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const stepBadge = step ? `<span style="color:var(--muted);font-size:0.7rem;margin-right:4px">#${step}</span>` : '';
  div.innerHTML = `
    <div class="evt-header">
      <span class="label">${stepBadge}${escapeHtml(label)}</span>
      <span class="ts">${ts}</span>
    </div>`;
  if (body) {
    const pre = document.createElement('pre');
    pre.textContent = body;
    div.appendChild(pre);
  }
  const events = document.getElementById('events');
  events.appendChild(div);
  events.scrollTop = events.scrollHeight;
}

// Token 流式气泡
const _tokenBubbles = {};

function appendToken(node, delta) {
  if (!_tokenBubbles[node]) {
    const div = document.createElement('div');
    const cls = ['parser','analyzer','reporter','db'].includes(node) ? node : 'node';
    div.className = `evt ${cls} streaming`;
    const icon = NODE_ICONS[node] || '⌨';
    div.innerHTML = `<div class="evt-header"><span class="label">${icon} ${node}</span></div>`;
    const pre = document.createElement('pre');
    div.appendChild(pre);
    const events = document.getElementById('events');
    events.appendChild(div);
    _tokenBubbles[node] = pre;
  }
  _tokenBubbles[node].textContent += delta;
  document.getElementById('events').scrollTop = 99999;
}

function finalizeToken(node) {
  if (_tokenBubbles[node]) {
    _tokenBubbles[node].parentElement?.remove();
    delete _tokenBubbles[node];
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function fill(q) {
  document.getElementById('query').value = q;
  document.getElementById('query').focus();
}
function clearEvents() { document.getElementById('events').innerHTML = ''; }

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) send();
});
</script>
</body>
</html>
