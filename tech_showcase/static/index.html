<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Java-to-Agent · Supervisor SSE Demo</title>
  <style>
    /* ── 极简样式（inline 便于单文件学习）─────────────────────── */
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "SF Mono", Menlo, Consolas, monospace;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #0f1419;
      color: #d4d8dc;
    }
    h1 { font-size: 1.2rem; margin-bottom: 0.2rem; }
    .subtitle { color: #7a8590; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    input[type="text"] {
      flex: 1; padding: 0.6rem 0.8rem; font-size: 0.95rem;
      background: #1a1f26; border: 1px solid #2a3038; color: #d4d8dc;
      border-radius: 4px; font-family: inherit;
    }
    button {
      padding: 0.6rem 1.2rem; font-size: 0.95rem;
      background: #3b82f6; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-family: inherit;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #4b5563; cursor: not-allowed; }

    .presets { margin-bottom: 1.2rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .presets button {
      background: #1a1f26; border: 1px solid #2a3038; color: #9ca3af;
      padding: 0.3rem 0.7rem; font-size: 0.8rem;
    }
    .presets button:hover { background: #2a3038; color: #d4d8dc; }

    #events {
      background: #1a1f26; border: 1px solid #2a3038;
      border-radius: 4px; padding: 1rem;
      min-height: 280px; max-height: 60vh;
      overflow-y: auto;
      white-space: pre-wrap; word-break: break-word;
      font-size: 0.85rem; line-height: 1.5;
    }
    .evt { margin-bottom: 0.8rem; padding: 0.5rem 0.8rem; border-left: 3px solid #3b82f6; }
    .evt.node      { border-left-color: #3b82f6; }
    .evt.supervisor { border-left-color: #fbbf24; background: rgba(251, 191, 36, 0.05); }
    .evt.parser    { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
    .evt.analyzer  { border-left-color: #a78bfa; background: rgba(167, 139, 250, 0.05); }
    .evt.reporter  { border-left-color: #ec4899; background: rgba(236, 72, 153, 0.05); }
    .evt.done      { border-left-color: #22c55e; background: rgba(34, 197, 94, 0.08); }
    .evt.error     { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.08); color: #fca5a5; }

    .label { font-weight: 600; color: #d4d8dc; margin-right: 0.5rem; }
    .ts { color: #6b7280; font-size: 0.75rem; float: right; }
    pre { margin: 0.3rem 0 0; font-size: 0.8rem; color: #9ca3af; }

    /* session 行 */
    .session-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.8rem; padding: 0.4rem 0.8rem;
      background: #11161c; border: 1px solid #2a3038; border-radius: 4px;
      font-size: 0.8rem; color: #9ca3af;
    }
    .session-bar .sid { color: #60a5fa; font-weight: 600; }
    .session-bar button {
      background: transparent; border: 1px solid #4b5563; color: #9ca3af;
      padding: 0.2rem 0.6rem; font-size: 0.75rem; border-radius: 3px;
    }
    .session-bar button:hover { background: #2a3038; color: #d4d8dc; }

    /* HITL 确认卡片 */
    .hitl-card {
      border: 1px solid #fbbf24; border-left-width: 4px;
      background: rgba(251, 191, 36, 0.08);
      border-radius: 4px; padding: 1rem;
      margin-bottom: 0.8rem;
    }
    .hitl-card h3 { margin: 0 0 0.5rem; font-size: 0.95rem; color: #fbbf24; }
    .hitl-card p  { margin: 0.3rem 0; font-size: 0.85rem; }
    .hitl-card .buttons { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
    .hitl-card .approve {
      background: #22c55e; color: white; border: none;
      padding: 0.5rem 1.2rem; border-radius: 4px; cursor: pointer; font-family: inherit;
    }
    .hitl-card .approve:hover { background: #16a34a; }
    .hitl-card .reject {
      background: transparent; color: #fca5a5;
      border: 1px solid #ef4444;
      padding: 0.5rem 1.2rem; border-radius: 4px; cursor: pointer; font-family: inherit;
    }
    .hitl-card .reject:hover { background: rgba(239, 68, 68, 0.15); }
    .evt.cancelled { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.08); color: #fcd34d; }
  </style>
</head>
<body>

<h1>🎯 LangGraph Supervisor · SSE 流式演示</h1>
<div class="subtitle">
  每个节点执行完会推一条事件，浏览器逐步显示 —— 不是等全部跑完才出结果。<br>
  <strong>多轮对话</strong>：同一 session 内可以追问"那 XX 呢？"，Supervisor 会联系上下文。<br>
  <strong>HITL</strong>：问"生成结构化报告"时会在调 Reporter 前暂停，等你点继续/取消。
</div>

<div class="session-bar">
  <span>Session: <span class="sid" id="sidLabel">（未开始）</span> · 已有 <span id="turnLabel">0</span> 轮</span>
  <button onclick="newConversation()">🔄 新对话</button>
</div>

<div class="presets">
  <button onclick="fill('今天有多少 ERROR？')">simple</button>
  <button onclick="fill('DBPool 为什么失败？')">analyze</button>
  <button onclick="fill('那 Payment 呢？')">那 Payment 呢？</button>
  <button onclick="fill('生成今天的结构化日志报告')">report</button>
  <button onclick="clearEvents()">清屏</button>
</div>

<div class="controls">
  <input type="text" id="query" placeholder="输入你的问题..." value="DBPool 为什么失败？" />
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<div id="events"></div>

<script>
// ── session 管理 ─────────────────────────────────────────────
const SESSION_KEY = 'lg_session_id';

function getSessionId() {
  return localStorage.getItem(SESSION_KEY);
}
function setSessionId(id) {
  localStorage.setItem(SESSION_KEY, id);
  updateSessionLabel(id, null);
}
function clearSessionId() {
  localStorage.removeItem(SESSION_KEY);
  updateSessionLabel(null, 0);
}
function updateSessionLabel(id, turn) {
  const sidEl = document.getElementById('sidLabel');
  const turnEl = document.getElementById('turnLabel');
  if (id) sidEl.textContent = id.slice(0, 8) + '...';
  else    sidEl.textContent = '（未开始）';
  if (turn !== null && turn !== undefined) turnEl.textContent = turn;
}
async function newConversation() {
  const oldId = getSessionId();
  if (oldId) {
    // 顺便清服务端（不阻塞前端）
    fetch(`/session/${oldId}`, { method: 'DELETE' }).catch(() => {});
  }
  clearSessionId();
  clearEvents();
  addEvent('info', '🆕 已开始新对话');
}

// HITL：记录当前挂起的 thread_id（interrupt 事件里拿到，resume 时用）
let pendingThreadId = null;

// 初始化 label
updateSessionLabel(getSessionId(), null);

// ── 核心：用 fetch + ReadableStream 读 SSE（浏览器原生 EventSource 不支持 POST）──
async function send() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  addEvent('info', `🚀 发送：${query}`);

  const body = { query };
  const sid = getSessionId();
  if (sid) body.session_id = sid;

  await callAndReadSSE('/chat/stream', body);
}

async function callAndReadSSE(url, body) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '运行中...';

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    }
    await readSSEStream(resp);
  } catch (e) {
    addEvent('error', `❌ ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = '发送';
  }
}

async function readSSEStream(resp) {
  // SSE 报文格式（sse-starlette 默认用 CRLF 行尾）：
  //   event: node\r\n
  //   data: {...}\r\n
  //   \r\n        ← 空行分隔事件
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });

    const chunks = buffer.split(/\r?\n\r?\n/);
    buffer = chunks.pop() || '';

    for (const chunk of chunks) {
      if (!chunk.trim()) continue;
      let eventType = 'message';
      let dataStr = '';
      for (const line of chunk.split(/\r?\n/)) {
        if (line.startsWith('event:')) eventType = line.slice(6).trim();
        else if (line.startsWith('data:')) dataStr += line.slice(5).trim();
      }
      if (!dataStr) continue;
      try {
        const payload = JSON.parse(dataStr);
        renderEvent(eventType, payload);
      } catch (e) {
        console.warn('parse err', e, dataStr);
      }
    }
  }
}

// HITL：用户点"继续"或"取消"
async function approveOrReject(approved) {
  if (!pendingThreadId) return;
  const body = {
    thread_id:  pendingThreadId,
    approved,
    session_id: getSessionId(),
  };
  pendingThreadId = null;  // 清掉，避免重复点
  addEvent('info', approved ? '✅ 已确认继续' : '🛑 已取消');
  await callAndReadSSE('/chat/resume', body);
}

function renderEvent(eventType, payload) {
  if (eventType === 'session') {
    // 首个事件：服务端告知 session_id 和已有历史轮数
    if (payload.session_id) setSessionId(payload.session_id);
    updateSessionLabel(payload.session_id, payload.prev_turns ?? 0);
    addEvent('info',
      `🔗 session ${payload.session_id.slice(0, 8)}... · 已有历史 ${payload.prev_turns} 轮`);
  } else if (eventType === 'token') {
    // Token 级流式：逐字追加到当前节点的输出气泡
    const node = payload.node || 'agent';
    appendToken(node, payload.delta || '');
  } else if (eventType === 'node') {
    const node = payload.node;
    const step = payload.step;
    const update = payload.update || {};
    // 节点分三类着色
    const cls = ['supervisor', 'parser', 'analyzer', 'reporter', 'db'].includes(node) ? node : 'node';

    let summary = '';
    if (node === 'supervisor') {
      summary = `路由 → ${update.next_agent || '?'}（loop=${update.loop_count || '?'}）`;
    } else if (update.agent_outputs && update.agent_outputs.length > 0) {
      summary = update.agent_outputs[update.agent_outputs.length - 1];
    } else if (update.final_report) {
      summary = `生成结构化报告：${update.final_report.summary || 'OK'}`;
    } else {
      summary = `节点 ${node} 执行完成`;
    }

    finalizeToken(node);  // 清空 token 气泡，改用 node 事件的 summary
    addEvent(cls, `[step ${step}] ${node}`, summary);
  } else if (eventType === 'interrupt') {
    // HITL：暂停，渲染确认卡片
    pendingThreadId = payload.thread_id;
    renderHitlCard(payload);
  } else if (eventType === 'cancelled') {
    addEvent('cancelled',
      `🛑 已取消 ${payload.pending_node || ''}`,
      payload.reason || '');
  } else if (eventType === 'done') {
    const fs = payload.final_state || {};
    if (payload.session_id) setSessionId(payload.session_id);
    updateSessionLabel(payload.session_id, payload.turn);

    let text = `流程结束，共 ${fs.loop_count || '?'} 次 Supervisor 调度 · 本 session 共 ${payload.turn} 轮`;
    if (payload.cancelled) text += '（本轮已取消，未生成 final_report）';
    if (payload.resumed_from) text += `（从 ${payload.resumed_from} 恢复）`;
    if (fs.final_report) {
      text += `\n\n最终结构化报告：\n${JSON.stringify(fs.final_report, null, 2)}`;
    }
    addEvent('done', '✅ done', text);
  } else if (eventType === 'error') {
    addEvent('error', '❌ error', payload.message || '未知错误');
  }
}

function renderHitlCard(payload) {
  const events = document.getElementById('events');
  const card = document.createElement('div');
  card.className = 'hitl-card';
  const preview = payload.state_preview || {};
  const outputsHtml = (preview.agent_outputs || [])
    .map(s => `<pre style="margin:0.2rem 0;">${escapeHtml(s.slice(0, 200))}</pre>`)
    .join('');
  card.innerHTML = `
    <h3>⏸ 暂停：等待你的确认</h3>
    <p><strong>即将执行：</strong>${escapeHtml(payload.pending_node)}</p>
    <p>${escapeHtml(payload.reason)}</p>
    <p style="color:#9ca3af; font-size:0.75rem;">已完成节点产出：</p>
    ${outputsHtml}
    <div class="buttons">
      <button class="approve" onclick="approveOrReject(true); this.parentElement.parentElement.remove();">✅ 继续</button>
      <button class="reject"  onclick="approveOrReject(false); this.parentElement.parentElement.remove();">🛑 取消</button>
    </div>
  `;
  events.appendChild(card);
  events.scrollTop = events.scrollHeight;
}

function addEvent(cls, label, body = '') {
  const div = document.createElement('div');
  div.className = `evt ${cls}`;
  const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  div.innerHTML = `<span class="label">${escapeHtml(label)}</span><span class="ts">${ts}</span>`;
  if (body) {
    const pre = document.createElement('pre');
    pre.textContent = body;
    div.appendChild(pre);
  }
  const events = document.getElementById('events');
  events.appendChild(div);
  events.scrollTop = events.scrollHeight;
}

// Token 级流式：逐字追加到正在流式输出的气泡
const _tokenBubbles = {};  // node -> DOM element

function appendToken(node, delta) {
  if (!_tokenBubbles[node]) {
    // 首个 token：创建气泡
    const div = document.createElement('div');
    const cls = ['parser', 'analyzer', 'reporter', 'db'].includes(node) ? node : 'node';
    div.className = `evt ${cls} streaming`;
    div.innerHTML = `<span class="label">⌨ ${node}</span>`;
    const pre = document.createElement('pre');
    pre.className = 'token-stream';
    div.appendChild(pre);
    const events = document.getElementById('events');
    events.appendChild(div);
    _tokenBubbles[node] = pre;
  }
  _tokenBubbles[node].textContent += delta;
  const events = document.getElementById('events');
  events.scrollTop = events.scrollHeight;
}

function finalizeToken(node) {
  // node 事件到来时移除流式气泡（由 addEvent 替代）
  if (_tokenBubbles[node]) {
    const bubble = _tokenBubbles[node].parentElement;
    if (bubble) bubble.remove();
    delete _tokenBubbles[node];
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function fill(q) { document.getElementById('query').value = q; }
function clearEvents() { document.getElementById('events').innerHTML = ''; }

// Enter 键发送
document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
</script>

</body>
</html>
